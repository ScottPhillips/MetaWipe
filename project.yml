name: MetaWipe
options:
  bundleIdPrefix: com.pixelfarms
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
targets:
  MetaWipe:
    type: application
    platform: macOS
    sources:
      - path: MetaWipe
        excludes:
          - "Resources/ExifTool/**"
      - path: MetaWipe/Resources/ExifTool
        type: folder
        buildPhase: resources
    info:
      path: MetaWipe/Resources/Info.plist
      properties:
        CFBundleDisplayName: MetaWipe
        CFBundleShortVersionString: "1.2.5"
        CFBundleVersion: "8"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: ""
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        ITSAppUsesNonExemptEncryption: false
        NSServices:
          - NSMenuItem:
              default: "Strip Meta Tags"
            NSMessage: stripMetaTags
            NSSendFileTypes:
              - public.item
          - NSMenuItem:
              default: "Edit Meta Tags"
            NSMessage: editMetaTags
            NSSendFileTypes:
              - public.item
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelfarms.MetaWipe
        PRODUCT_NAME: MetaWipe
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2.5"
        CURRENT_PROJECT_VERSION: "8"
